services:
  consul:
    image: hashicorp/consul

  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379

  localstack:
    image: localstack/localstack:4
    environment:
      SERVICES: dynamodb,ssm

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "super-secret-token"

  zookeeper:
    image: zookeeper
    environment:
      ZOO_STANDALONE_ENABLED: "true"

  test-runner:
    build:
      context: ..
      dockerfile: test/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_started
      etcd:
        condition: service_started
      localstack:
        condition: service_started
      vault:
        condition: service_started
      zookeeper:
        condition: service_started
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      ETCD_ENDPOINT: http://etcd:2379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: super-secret-token
      ZOOKEEPER_NODE: zookeeper:2181
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      DYNAMODB_LOCAL: "1"
      DYNAMODB_ENDPOINT_URL: http://localstack:4566
      SSM_LOCAL: "1"
      SSM_ENDPOINT_URL: http://localstack:4566
